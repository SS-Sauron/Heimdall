<style>
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .oracle-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(5, 5, 5, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 0 0 #D4AF37;
        }

        /* Subtle morse pulse animation */
        @keyframes morsePulse {
            0%, 100% { opacity: 0.1; }
            5% { opacity: 0.3; } /* D: -.. */
            10% { opacity: 0.1; }
            15% { opacity: 0.3; }
            20% { opacity: 0.1; }
            25% { opacity: 0.3; } /* O: --- */
            30% { opacity: 0.1; }
            35% { opacity: 0.3; }
            40% { opacity: 0.1; }
            45% { opacity: 0.3; }
            50% { opacity: 0.1; }
            /* Simplified for effect */
            80% { opacity: 0.4; text-shadow: 0 0 8px rgba(212, 175, 55, 0.8); }
        }

        .morse-eye {
            animation: morsePulse 8s infinite;
        }
    </style>
